<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Pop Game</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg1:#a1c4fd;
      --bg2:#c2e9fb;
      --accent:#ff4b5c;
      --panel:#fdf0f5;
    }
    html,body{height:100%;margin:0}
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 720px;
      max-width: calc(100% - 40px);
      height: 520px;
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(10,10,20,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px;
      box-sizing: border-box;
      overflow: hidden;
    }

    #scoreBoard {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
      box-sizing: border-box;
      padding: 0 6px;
    }

    #wordArea {
      position: relative;
      width: 100%;
      height: 360px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.06);
      background: linear-gradient(180deg,#fff0, #ffe6f0);
      overflow: hidden;
      box-sizing: border-box;
    }

    .word {
      position: absolute;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      user-select: none;
      white-space: nowrap;
      padding: 4px 8px;
      background: rgba(255,75,92,0.06);
      border-radius: 6px;
      pointer-events: none;
      transform: translateY(0);
    }

    .controlsRow {
      margin-top: 12px;
      display:flex;
      gap:12px;
      align-items:center;
      width:100%;
      justify-content:center;
    }

    input[type="text"]{
      padding:10px 12px;
      font-size:16px;
      width:260px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,0.08);
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      border:none;
      border-radius:8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    button:disabled{opacity:0.6; cursor:not-allowed}

    #timeRemaining { font-size:14px; color:#333; margin-top:8px; }

    #gameOverScreen, #difficultyScreen {
      position:absolute;
      inset: 0;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index: 40;
      border-radius: 12px;
    }

    #gameOverScreen { background: rgba(0,0,0,0.6); color:#fff; display:none; }
    #gameOverScreen .panel { background: transparent; text-align:center; padding:12px; }

    #difficultyScreen {
      background: rgba(255,255,255,0.96);
      z-index: 50;
    }
    .diffTitle { font-size:20px; margin-bottom:12px; color:#222; }
    .diffBtns{ display:flex; gap:10px; margin-top:6px; }
    .diffBtns button { min-width:100px; }
  </style>
</head>
<body>
  <div id="container">
    <div id="scoreBoard">
      <div>Your Score: <span id="score">0</span></div>
      <div>High Score: <span id="highScore">0</span></div>
      <div>Lives: <span id="lives">3</span></div>
    </div>

    <div id="wordArea" aria-live="polite"></div>

    <div class="controlsRow">
      <input type="text" id="wordInput" placeholder="Type here..." disabled autocomplete="off" />
      <button id="startBtn">Start Game ▶️</button>
    </div>

    <div id="timeRemaining" aria-hidden="false"></div>

    <!-- Game Over Overlay -->
    <div id="gameOverScreen" role="dialog" aria-modal="true">
      <div class="panel">
        <div style="font-size:28px;font-weight:800">Game Over</div>
        <div id="finalScores" style="margin-top:10px;font-size:18px"></div>
        <div style="margin-top:14px">
          <button id="restartBtn">Restart 🔄</button>
        </div>
      </div>
    </div>

    <!-- Difficulty selection -->
    <div id="difficultyScreen" role="dialog" aria-modal="true">
      <div style="text-align:center">
        <div class="diffTitle">Select Difficulty</div>
        <div class="diffBtns">
          <button data-diff="easy">🙂 Easy</button>
          <button data-diff="medium">😎 Medium</button>
          <button data-diff="hard">🔥 Hard</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const wordArea = document.getElementById('wordArea');
      const wordInput = document.getElementById('wordInput');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highScore');
      const livesEl = document.getElementById('lives');
      const timeEl = document.getElementById('timeRemaining');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const finalScores = document.getElementById('finalScores');
      const difficultyScreen = document.getElementById('difficultyScreen');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');

      const words = ["apple","banana","orange","grape","melon","kiwi","peach","mango","cherry","pear","lemon","plum","berry","lime","papaya","apricot","fig","guava","date","coconut","avocado"];

      let fallingWords = [];
      let score = 0;
      let lives = 3;
      let highScore = 0;
      let spawnIntervalId = null;
      let gameIntervalId = null;
      let timerIntervalId = null;
      let difficulty = 'easy';
      let speed = 1;
      let spawnRate = 2000;
      let timeLimit = 45;
      let remainingTime = 0;
      let running = false;

      // utility: clear all intervals safely
      function clearAllTimers(){
        if(spawnIntervalId){ clearInterval(spawnIntervalId); spawnIntervalId = null; }
        if(gameIntervalId){ clearInterval(gameIntervalId); gameIntervalId = null; }
        if(timerIntervalId){ clearInterval(timerIntervalId); timerIntervalId = null; }
      }

      // set difficulty params
      function setDifficultyParams(level){
        difficulty = level;
        if(level === 'easy'){ speed = 1; spawnRate = 2000; timeLimit = 45; }
        else if(level === 'medium'){ speed = 1.8; spawnRate = 1400; timeLimit = 30; }
        else { speed = 2.6; spawnRate = 1000; timeLimit = 20; }
      }

      // spawn a single word
      function spawnWord(){
        if(!wordArea) return;
        const text = words[Math.floor(Math.random()*words.length)];
        const el = document.createElement('div');
        el.className = 'word';
        el.textContent = text;
        el.style.top = '0px';
        el.style.left = '0px';
        wordArea.appendChild(el);

        // ensure laid out then compute correct left so it doesn't overflow
        requestAnimationFrame(()=>{
          const maxLeft = Math.max(0, wordArea.clientWidth - el.offsetWidth - 6);
          const left = Math.floor(Math.random() * (maxLeft + 1));
          el.style.left = left + 'px';
          fallingWords.push({ el, text: text.toLowerCase(), y: 0 });
        });
      }

      // start spawning at interval
      function startSpawning(){
        if(spawnIntervalId) clearInterval(spawnIntervalId);
        spawnIntervalId = setInterval(spawnWord, spawnRate);
        // spawn an initial word immediately for better pacing
        spawnWord();
      }

      // update falling words
      function updateWords(){
        for(let i = fallingWords.length - 1; i >= 0; i--){
          const item = fallingWords[i];
          item.y += speed;
          item.el.style.top = item.y + 'px';

          const elHeight = item.el.offsetHeight || 24;
          if(item.y + elHeight >= wordArea.clientHeight - 4){
            // missed
            lives--;
            livesEl.textContent = lives;
            // remove safely
            if(item.el.parentNode === wordArea) wordArea.removeChild(item.el);
            fallingWords.splice(i,1);
            if(lives <= 0){
              gameOver();
              return;
            }
          }
        }
      }

      // timer tick
      function updateTimer(){
        remainingTime--;
        timeEl.textContent = "Time: " + remainingTime + "s";
        if(remainingTime <= 0){
          gameOver();
        }
      }

      // main game loop (small interval to move words smoothly)
      function startGameLoop(){
        if(gameIntervalId) clearInterval(gameIntervalId);
        gameIntervalId = setInterval(updateWords, 20);
      }

      function startTimer(){
        if(timerIntervalId) clearInterval(timerIntervalId);
        timerIntervalId = setInterval(updateTimer, 1000);
      }

      // start full game given difficulty already chosen
      function beginGame(){
        clearAllTimers();
        // reset state
        score = 0;
        lives = 3;
        scoreEl.textContent = score;
        livesEl.textContent = lives;
        fallingWords.forEach(w => { if(w.el.parentNode === wordArea) wordArea.removeChild(w.el); });
        fallingWords = [];
        wordInput.value = '';
        gameOverScreen.style.display = 'none';
        remainingTime = timeLimit;
        timeEl.textContent = "Time: " + remainingTime + "s";

        // load highscore per difficulty
        highScore = parseInt(localStorage.getItem('wordPopHighScore_' + difficulty)) || 0;
        highScoreEl.textContent = highScore;

        // start
        running = true;
        startBtn.disabled = true;
        wordInput.disabled = false;
        wordInput.focus();
        startSpawning();
        startGameLoop();
        startTimer();
      }

      // on correct typed word
      function onCorrectWord(index){
        score += 1;
        scoreEl.textContent = score;
        const removed = fallingWords.splice(index,1)[0];
        if(removed && removed.el.parentNode === wordArea) wordArea.removeChild(removed.el);
        if(score > highScore){
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('wordPopHighScore_' + difficulty, highScore);
        }
      }

      // game over
      function gameOver(){
        clearAllTimers();
        running = false;
        startBtn.disabled = false;
        wordInput.disabled = true;
        finalScores.innerHTML = `Your Score: ${score}<br>High Score (${difficulty}): ${highScore}`;
        gameOverScreen.style.display = 'flex';
      }

      // public actions
      function handleStartClick(){
        // show difficulty overlay
        difficultyScreen.style.display = 'flex';
      }

      // restart
      function restartGame(){
        difficultyScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        beginGame();
      }

      // wire buttons
      startBtn.addEventListener('click', handleStartClick);
      restartBtn.addEventListener('click', restartGame);

      // difficulty buttons
      difficultyScreen.querySelectorAll('button[data-diff]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const level = btn.getAttribute('data-diff');
          setDifficultyParams(level);
          difficultyScreen.style.display = 'none';
          beginGame();
        });
      });

      // typing input handler (case-insensitive)
      wordInput.addEventListener('input', ()=>{
        if(!running) return;
        const val = wordInput.value.trim().toLowerCase();
        if(!val) return;
        for(let i = 0; i < fallingWords.length; i++){
          if(fallingWords[i].text === val){
            onCorrectWord(i);
            wordInput.value = '';
            return;
          }
        }
      });

      // keyboard: pressing Enter attempts to match too
      wordInput.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){
          e.preventDefault();
          const val = wordInput.value.trim().toLowerCase();
          if(!val) return;
          for(let i = 0; i < fallingWords.length; i++){
            if(fallingWords[i].text === val){
              onCorrectWord(i);
              wordInput.value = '';
              return;
            }
          }
        }
      });

      // cleanup when page hidden/unloaded
      window.addEventListener('beforeunload', ()=> clearAllTimers());
      document.addEventListener('visibilitychange', ()=>{
        if(document.hidden) clearAllTimers();
      });

      // initial state
      difficultyScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      // show difficulty on first start
      // keep start button enabled
    })();
  </script>
</body>
</html>
