<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2048 Game</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  position: relative;
}
#gameContainer {
  background: #bbada0;
  padding: 15px;
  border-radius: 10px;
  display: grid;
  grid-template-columns: repeat(4, 100px);
  grid-template-rows: repeat(4, 100px);
  gap: 15px;
  position: relative;
}
.tile {
  width: 100px;
  height: 100px;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: bold;
  color: #776e65;
  background: rgba(238,228,218,0.35);
  transition: all 0.2s ease;
}
.tile[data-value="2"] { background: #eee4da; }
.tile[data-value="4"] { background: #ede0c8; }
.tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
.tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
.tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
.tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
.tile[data-value="128"] { background: #edcf72; color: #f9f6f2; }
.tile[data-value="256"] { background: #edcc61; color: #f9f6f2; }
.tile[data-value="512"] { background: #edc850; color: #f9f6f2; }
.tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; }
.tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; }

#scoreBoard {
  position: absolute;
  top: -80px;
  left: 0;
  display: flex;
  justify-content: space-between;
  width: 100%;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
}
button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #ff4b5c;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
button:hover { transform: scale(1.05); }

#gameOverScreen {
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: #fff;
  font-size: 32px;
  font-weight: bold;
  display: none;
  z-index: 5;
  border-radius: 10px;
}
#gameOverScreen button {
  font-size: 20px;
  padding: 10px 20px;
}
</style>
</head>
<body>
<div id="container" style="position:relative;">
  <div id="scoreBoard">
    Score: <span id="score">0</span> | High Score: <span id="highScore">0</span>
    <button onclick="restartGame()">Restart</button>
  </div>
  <div id="gameContainer"></div>
  <div id="gameOverScreen">
    <div>Game Over</div>
    <div id="finalScores"></div>
    <button onclick="restartGame()">Restart 🔄</button>
  </div>
</div>

<script>
const container = document.getElementById("gameContainer");
const scoreEl = document.getElementById("score");
const highScoreEl = document.getElementById("highScore");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScores = document.getElementById("finalScores");

let grid = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
highScoreEl.textContent = highScore;

function initGrid() {
  grid = Array(4).fill().map(() => Array(4).fill(0));
  addRandomTile();
  addRandomTile();
  renderGrid();
  score = 0;
  scoreEl.textContent = score;
  gameOverScreen.style.display = "none";
}

function renderGrid() {
  container.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const tile = document.createElement('div');
      tile.classList.add('tile');
      if(grid[r][c] !== 0) tile.textContent = grid[r][c];
      tile.dataset.value = grid[r][c];
      container.appendChild(tile);
    }
  }
}

function addRandomTile() {
  const empty = [];
  for(let r=0; r<4; r++){
    for(let c=0; c<4; c++){
      if(grid[r][c] === 0) empty.push([r,c]);
    }
  }
  if(empty.length === 0) return;
  const [r,c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function move(direction){
  let moved = false;
  function slide(row){
    let arr = row.filter(v => v!==0);
    for(let i=0;i<arr.length-1;i++){
      if(arr[i]===arr[i+1]){
        arr[i]*=2;
        score += arr[i];
        arr[i+1]=0;
      }
    }
    arr = arr.filter(v => v!==0);
    while(arr.length<4) arr.push(0);
    return arr;
  }

  if(direction==='left'){
    for(let r=0;r<4;r++){
      const newRow = slide(grid[r]);
      if(!grid[r].every((v,i)=>v===newRow[i])) moved=true;
      grid[r] = newRow;
    }
  } else if(direction==='right'){
    for(let r=0;r<4;r++){
      const newRow = slide(grid[r].slice().reverse()).reverse();
      if(!grid[r].every((v,i)=>v===newRow[i])) moved=true;
      grid[r] = newRow;
    }
  } else if(direction==='up'){
    for(let c=0;c<4;c++){
      let col = grid.map(r=>r[c]);
      const newCol = slide(col);
      for(let r=0;r<4;r++){
        if(grid[r][c]!==newCol[r]) moved=true;
        grid[r][c]=newCol[r];
      }
    }
  } else if(direction==='down'){
    for(let c=0;c<4;c++){
      let col = grid.map(r=>r[c]).reverse();
      const newCol = slide(col).reverse();
      for(let r=0;r<4;r++){
        if(grid[r][c]!==newCol[r]) moved=true;
        grid[r][c]=newCol[r];
      }
    }
  }

  if(moved){
    addRandomTile();
    renderGrid();
    scoreEl.textContent = score;
    if(score > highScore){
      highScore = score;
      highScoreEl.textContent = highScore;
      localStorage.setItem("highScore", highScore);
    }
    if(checkGameOver()){
      showGameOver();
    }
  }
}

function checkGameOver(){
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(grid[r][c]===0) return false;
      if(c<3 && grid[r][c]===grid[r][c+1]) return false;
      if(r<3 && grid[r][c]===grid[r+1][c]) return false;
    }
  }
  return true;
}

function showGameOver(){
  finalScores.innerHTML = `Your Score: ${score}<br>High Score: ${highScore}`;
  gameOverScreen.style.display = "flex";
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') move('left');
  else if(e.key==='ArrowRight') move('right');
  else if(e.key==='ArrowUp') move('up');
  else if(e.key==='ArrowDown') move('down');
});

function restartGame(){
  initGrid();
}

initGrid();
</script>
</body>
</html>
