<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Speed Game</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #ffecd2, #fcb69f);
    }

    h1 {
        margin-bottom: 20px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    }

    #startBtn, #clickBtn, #restartBtn, #resetHighScoreBtn {
        padding: 15px 30px;
        font-size: 20px;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #startBtn {
        background: #ff6f61;
        color: white;
    }
    #startBtn:hover { background: #ff3b2e; }

    #clickBtn {
        background: #6a5acd;
        color: white;
        display: none;
    }
    #clickBtn:hover { background: #4b3fa7; }

    #restartBtn {
        background: #00c6ff;
        color: black;
        display: none;
    }
    #restartBtn:hover { background: #0072ff; color: white; }

    #resetHighScoreBtn {
        background: #ffcc00;
        color: black;
        display: none;
    }
    #resetHighScoreBtn:hover { background: #e6b800; color: white; }

    #score, #timer, #finalScore, #highScore, #message {
        font-size: 24px;
        margin: 10px;
        color: #111;
    }

    #message {
        font-size: 22px;
        font-weight: bold;
        color: green;
    }
</style>
</head>
<body>

<h1>Click Speed Game</h1>

<button id="startBtn">Start Game 🏁</button>
<div id="timer"></div>
<div id="score"></div>
<button id="clickBtn">Click Me! 🖱️</button>
<div id="highScore" style="display: none;"></div>
<div id="finalScore"></div>
<div id="message"></div>
<button id="restartBtn">Restart 🔄</button>
<button id="resetHighScoreBtn">Reset High Score ❌</button>

<script>
const startBtn = document.getElementById('startBtn');
const clickBtn = document.getElementById('clickBtn');
const restartBtn = document.getElementById('restartBtn');
const resetHighScoreBtn = document.getElementById('resetHighScoreBtn');
const scoreDiv = document.getElementById('score');
const timerDiv = document.getElementById('timer');
const finalScoreDiv = document.getElementById('finalScore');
const highScoreDiv = document.getElementById('highScore');
const messageDiv = document.getElementById('message');

let score = 0;
let timeLeft = 10;
let gameInterval;
let highScore = localStorage.getItem("highScore") || 0;

startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    clickBtn.style.display = 'inline-block';
    restartBtn.style.display = 'none';
    resetHighScoreBtn.style.display = 'none';
    scoreDiv.innerText = 'Your Score: 0';
    timerDiv.innerText = 'Time: 10s';
    finalScoreDiv.innerText = '';
    messageDiv.innerText = '';
    highScoreDiv.innerText = `🏆 High Score: ${highScore}`;
    highScoreDiv.style.display = 'block';
    score = 0;
    timeLeft = 10;

    gameInterval = setInterval(() => {
        timeLeft--;
        timerDiv.innerText = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);
});

clickBtn.addEventListener('click', () => {
    score++;
    scoreDiv.innerText = `Your Score: ${score}`;
});

function endGame() {
    clearInterval(gameInterval);
    clickBtn.style.display = 'none';
    finalScoreDiv.innerText = `Game Over! Your Score: ${score}`;

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        messageDiv.innerText = "🎉 Yahoo! You broke the high score! 🎉";
    } else {
        messageDiv.innerText = "";
    }

    highScoreDiv.innerText = `🏆 High Score: ${highScore}`;
    restartBtn.style.display = 'inline-block';
    resetHighScoreBtn.style.display = 'inline-block';
}

restartBtn.addEventListener('click', () => {
    restartBtn.style.display = 'none';
    resetHighScoreBtn.style.display = 'none';
    finalScoreDiv.innerText = '';
    messageDiv.innerText = '';
    highScoreDiv.style.display = 'none';
    startBtn.style.display = 'inline-block';
    scoreDiv.innerText = '';
    timerDiv.innerText = '';
});

resetHighScoreBtn.addEventListener('click', () => {
    localStorage.removeItem("highScore");
    highScore = 0;
    highScoreDiv.innerText = `🏆 High Score: ${highScore}`;
});
</script>

</body>
</html>
