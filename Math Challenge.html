<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Challenge Game</title>
<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg,#a1c4fd,#c2e9fb);
}
#container {
  position: relative;
  width: 500px;
  height: 400px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #fdf0f5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#scoreBoard {
  display:flex;
  justify-content:space-between;
  width: 90%;
  margin:10px 0;
  font-size:18px;
  font-weight:bold;
}
#question {
  font-size:28px;
  margin:20px 0;
}
input {
  font-size:20px;
  padding:5px;
  width:100px;
  text-align:center;
}
button {
  margin-top:10px;
  padding:6px 12px;
  font-size:16px;
  border:none;
  border-radius:5px;
  background:#ff4b5c;
  color:#fff;
  cursor:pointer;
}
button:hover { transform:scale(1.05);}
#gameOverScreen {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
  font-size:28px;
  font-weight:bold;
  display:none;
  z-index:5;
  border-radius:10px;
}
#gameOverScreen button { font-size:20px; padding:8px 16px; margin-top:15px; }
#difficultyScreen {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(255,255,255,0.9);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:5;
  border-radius:10px;
}
#difficultyScreen button { margin:10px; padding:10px 20px; font-size:18px; cursor:pointer; border:none; border-radius:6px; background:#ff4b5c; color:#fff;}
#difficultyScreen button:hover {transform:scale(1.05);}
.diffTitle { font-size:24px; font-weight:bold; margin-bottom:20px;}
#timer { margin-top:10px; font-weight:bold;}
</style>
</head>
<body>
<div id="container">
  <div id="scoreBoard">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="highScore">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
  </div>
  <div id="timer">Time: 45s</div>
  <div id="question"></div>
  <input type="number" id="answerInput" disabled>
  <button id="startBtn">Start Game ▶️</button>
  <div id="gameOverScreen">
    <div>Game Over</div>
    <div id="finalScores"></div>
    <button onclick="restartGame()">Restart 🔄</button>
  </div>
  <div id="difficultyScreen">
    <div class="diffTitle">Select Difficulty</div>
    <button onclick="setDifficulty('easy')">🙂 Easy</button>
    <button onclick="setDifficulty('medium')">😎 Medium</button>
    <button onclick="setDifficulty('hard')">🔥 Hard</button>
  </div>
</div>

<script>
const questionEl = document.getElementById('question');
const answerInput = document.getElementById('answerInput');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const livesEl = document.getElementById('lives');
const timerEl = document.getElementById('timer');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScores = document.getElementById('finalScores');
const difficultyScreen = document.getElementById('difficultyScreen');
const startBtn = document.getElementById('startBtn');

let score=0;
let lives=3;
let highScore=0;
let currentAnswer=0;
let timeLeft=45;
let gameTimer;
let difficulty='easy';

const settings = {
  easy: {maxNum:20, operations:['+','-']},
  medium: {maxNum:50, operations:['+','-','*']},
  hard: {maxNum:100, operations:['+','-','*','/']}
};

startBtn.addEventListener('click', startGame);
answerInput.addEventListener('keydown', checkAnswer);

function startGame(){
  difficultyScreen.style.display='flex';
  score=0;
  lives=3;
  timeLeft=45;
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  timerEl.textContent='Time: '+timeLeft+'s';
  answerInput.value='';
  questionEl.textContent='';
  gameOverScreen.style.display='none';
}

function setDifficulty(level){
  difficulty = level;
  difficultyScreen.style.display='none';
  highScore = parseInt(localStorage.getItem('mathHighScore_'+difficulty)) || 0;
  highScoreEl.textContent = highScore;
  answerInput.disabled=false;
  answerInput.focus();
  generateQuestion();
  gameTimer = setInterval(updateTimer,1000);
}

function generateQuestion(){
  const {maxNum, operations} = settings[difficulty];
  let num1=Math.floor(Math.random()*maxNum)+1;
  let num2=Math.floor(Math.random()*maxNum)+1;
  let op = operations[Math.floor(Math.random()*operations.length)];
  if(op==='/' && num2===0) num2=1;
  if(op==='/') num1 = num1 - (num1%num2);
  currentAnswer = eval(num1+op+num2);
  questionEl.textContent = `${num1} ${op} ${num2} = ?`;
}

function checkAnswer(e){
  if(e.key==='Enter'){
    const val = Number(answerInput.value.trim());
    if(val === currentAnswer){
      score++;
      scoreEl.textContent=score;
      if(score>highScore){
        highScore=score;
        highScoreEl.textContent=highScore;
        localStorage.setItem('mathHighScore_'+difficulty,highScore);
      }
    } else {
      lives--;
      livesEl.textContent=lives;
      if(lives<=0) gameOver();
    }
    answerInput.value='';
    if(lives>0 && timeLeft>0) generateQuestion();
  }
}

function updateTimer(){
  timeLeft--;
  timerEl.textContent='Time: '+timeLeft+'s';
  if(timeLeft<=0) gameOver();
}

function gameOver(){
  clearInterval(gameTimer);
  answerInput.disabled=true;
  finalScores.innerHTML = `Your Score: ${score}<br>High Score: ${highScore}`;
  gameOverScreen.style.display='flex';
}

function restartGame(){
  gameOverScreen.style.display='none';
  startGame();
}
</script>
</body>
</html>
