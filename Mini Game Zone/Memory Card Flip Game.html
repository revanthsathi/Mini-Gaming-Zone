<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memory Card Flip Game</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #E6E6FA, #D8BFD8, #9370DB, #BA55D3);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: #fff;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin: 20px 0;
      font-size: 44px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
    }

    .menu, .difficulty {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #6a0dad;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #580c9e;
    }

    .hidden { display: none; }

    .scoreboard {
      margin: 15px 0;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    .board {
      display: grid;
      grid-gap: 12px;
      justify-content: center;
      margin-top: 15px;
    }

    .card {
      width: 100px;
      height: 120px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: bold;
    }

    .card-front {
      background: #4b0082;
      color: transparent;
    }

    .card-back {
      background: #9370DB;
      transform: rotateY(180deg);
      color: #fff;
    }

    #status {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <h1>🃏 Memory Card Flip Game</h1>

  <div class="menu" id="menu">
    <button onclick="chooseMode('1p')">1 Player</button>
    <button onclick="chooseMode('2p')">2 Players</button>
  </div>

  <div class="difficulty hidden" id="difficultyMenu">
    <button onclick="startGame('easy')">Easy 🐣</button>
    <button onclick="startGame('medium')">Medium 🙂</button>
    <button onclick="startGame('hard')">Hard 😈</button>
  </div>

  <div class="scoreboard hidden" id="scoreboard">
    <span id="player1Score">Player 1: 0</span>
    <span id="player2Score" class="hidden"> | Player 2: 0</span>
    <span id="movesLeft"> | Moves: 0</span>
  </div>

  <div class="board hidden" id="board"></div>
  <div id="status"></div>

  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const p1ScoreEl = document.getElementById("player1Score");
    const p2ScoreEl = document.getElementById("player2Score");
    const movesEl = document.getElementById("movesLeft");
    const menu = document.getElementById("menu");
    const difficultyMenu = document.getElementById("difficultyMenu");
    const scoreboard = document.getElementById("scoreboard");

    let cards = [];
    let flippedCards = [];
    let player1Score = 0, player2Score = 0;
    let currentPlayer = 1;
    let lockBoard = false;
    let gameMode = "";
    let difficulty = "";
    let movesLeft = 0;

    const easySymbols = ["🐶","🐱","🐰","🐼"];
    const mediumSymbols = ["🍎","🍌","🍇","🍓","🍒","🍉","🥭","🍍","🍑","🍈","🍐","🍊"];
    const hardSymbols = ["⚽","🏀","🏈","⚾","🎾","🏐","🥎","🏉","🎱","🏓","🏸","🥏",
                         "🎯","🥊","🥋","🎳","⛳","🤿","🥌","🛹","🛷","🪂","🪁","🏒"];

    const bonusCards = ["+1","+2"];
    const emptyCard = ""; // blank visually

    function chooseMode(mode) {
      gameMode = mode;
      menu.classList.add("hidden");
      if (mode === "1p") {
        difficultyMenu.classList.remove("hidden");
        p2ScoreEl.classList.add("hidden");
      } else {
        p2ScoreEl.classList.remove("hidden");
        startGame("medium");
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startGame(level) {
      difficulty = level;
      difficultyMenu.classList.add("hidden");
      scoreboard.classList.remove("hidden");
      boardEl.classList.remove("hidden");

      player1Score = 0;
      player2Score = 0;
      currentPlayer = 1;

      if (level === "easy") movesLeft = 12;
      else if (level === "medium") movesLeft = 25;
      else movesLeft = 40;

      updateScores();
      statusEl.innerText = `Player ${currentPlayer}'s turn`;

      let gridSize = level === "easy" ? 3 : level === "medium" ? 5 : 7;
      boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 100px)`;
      createBoard(level, gridSize * gridSize);
    }

    function createBoard(level, totalCards) {
      boardEl.innerHTML = "";
      let symbols, deck = [];

      if (level === "easy") {
        symbols = easySymbols.slice(0, Math.floor(totalCards/2));
        deck = [...symbols, ...symbols];
        if (deck.length < totalCards) deck.push(emptyCard);
      } 
      else if (level === "medium") {
        symbols = mediumSymbols.slice(0, 10);
        deck = [...symbols, ...symbols];
        let fillers = ["", "", "+1", "+2"]; 
        while (deck.length < totalCards) deck.push(fillers[Math.floor(Math.random()*fillers.length)]);
      } 
      else {
        symbols = hardSymbols.slice(0, 20);
        deck = [...symbols, ...symbols];
        let fillers = ["", "", "+1", "+2"]; 
        while (deck.length < totalCards) deck.push(fillers[Math.floor(Math.random()*fillers.length)]);
      }

      deck = shuffle(deck);

      cards = deck.map(symbol => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.symbol = symbol;

        const inner = document.createElement("div");
        inner.classList.add("card-inner");

        const front = document.createElement("div");
        front.classList.add("card-front");

        const back = document.createElement("div");
        back.classList.add("card-back");
        back.innerText = symbol;

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);

        card.addEventListener("click", () => flipCard(card));
        boardEl.appendChild(card);
        return card;
      });
    }

    function flipCard(card) {
      if (lockBoard || card.classList.contains("flipped")) return;
      card.classList.add("flipped");

      let symbol = card.dataset.symbol;

      if (symbol === "+1" || symbol === "+2") {
        let bonus = parseInt(symbol.replace("+",""));
        movesLeft += bonus;
        movesEl.innerText = ` | Moves: ${movesLeft}`;
        statusEl.innerText = `Bonus! +${bonus} moves 🎉`;
        return;
      }
      if (symbol === "") return;

      flippedCards.push(card);
      if (flippedCards.length === 2) {
        movesLeft--;
        movesEl.innerText = ` | Moves: ${movesLeft}`;
        checkMatch();
      }
    }

    function checkMatch() {
      lockBoard = true;
      const [card1, card2] = flippedCards;
      if (card1.dataset.symbol === card2.dataset.symbol) {
        if (currentPlayer === 1) player1Score++; else player2Score++;
        updateScores();
        resetTurn();
        checkGameEnd();
      } else {
        setTimeout(() => {
          card1.classList.remove("flipped");
          card2.classList.remove("flipped");
          resetTurn();
          if(gameMode === "2p") switchTurn();
        }, 800);
      }
    }

    function resetTurn() {
      flippedCards = [];
      lockBoard = false;
    }

    function switchTurn() {
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      statusEl.innerText = `Player ${currentPlayer}'s turn`;
    }

    function updateScores() {
      p1ScoreEl.innerText = `Player 1: ${player1Score}`;
      if(gameMode==="2p") p2ScoreEl.innerText = ` | Player 2: ${player2Score}`;
      movesEl.innerText = ` | Moves: ${movesLeft}`;
    }

    function checkGameEnd() {
      if (cards.every(card => card.classList.contains("flipped")) || movesLeft <= 0) {
        let winner = "Draw 🤝";
        if (player1Score > player2Score) winner = "Player 1 Wins 🎉";
        else if (gameMode==="2p" && player2Score > player1Score) winner = "Player 2 Wins 🎉";
        else if (movesLeft <= 0) winner = "Out of moves! Game Over ⏳";
        statusEl.innerText = winner;
      }
    }
  </script>
</body>
</html>
