<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors vs Computer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc, #ff6a95, #ff9a9e, #fbc2eb, #a18cd1);
      background-size: 600% 600%;
      animation: gradientBG 5s ease infinite;
      text-align: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 50px;
      color: #fff;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5), 0 0 15px #fff, 0 0 25px #fbb1b1;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    .choices {
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 15px 25px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .choices button {
      background: #ff6a95;
      color: white;
    }

    .choices button:hover {
      background: #ff4b75;
    }

    .controls button {
      background: #00c6ff;
      color: white;
    }

    .controls button:hover {
      background: #0072ff;
    }

    #status {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <h1>✊ Rock Paper Scissors 💻</h1>

  <div class="scoreboard">
    <div>🧑 Player: <span id="playerScore">0</span></div>
    <div>💻 Computer: <span id="computerScore">0</span></div>
    <div>🤝 Draws: <span id="draws">0</span></div>
  </div>

  <div class="choices">
    <button onclick="play('rock')">✊ Rock</button>
    <button onclick="play('paper')">✋ Paper</button>
    <button onclick="play('scissors')">✌️ Scissors</button>
  </div>

  <div id="status"></div>

  <div class="controls">
    <button onclick="resetGame()">Restart Game 🔄</button>
  </div>

  <script>
    const playerScoreEl = document.getElementById("playerScore");
    const computerScoreEl = document.getElementById("computerScore");
    const drawsEl = document.getElementById("draws");
    const statusDiv = document.getElementById("status");

    let playerScore = 0;
    let computerScore = 0;
    let draws = 0;

    function play(playerChoice) {
      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * 3)];

      if (playerChoice === computerChoice) {
        draws++;
        statusDiv.innerText = `🤝 Draw! Both chose ${playerChoice}`;
      } else if (
        (playerChoice === 'rock' && computerChoice === 'scissors') ||
        (playerChoice === 'paper' && computerChoice === 'rock') ||
        (playerChoice === 'scissors' && computerChoice === 'paper')
      ) {
        playerScore++;
        statusDiv.innerText = `🧑 You Win! ${playerChoice} beats ${computerChoice}`;
      } else {
        computerScore++;
        statusDiv.innerText = `💻 Computer Wins! ${computerChoice} beats ${playerChoice}`;
      }

      updateScores();
    }

    function updateScores() {
      playerScoreEl.innerText = playerScore;
      computerScoreEl.innerText = computerScore;
      drawsEl.innerText = draws;
    }

    function resetGame() {
      playerScore = 0;
      computerScore = 0;
      draws = 0;
      statusDiv.innerText = '';
      updateScores();
    }
  </script>
</body>
</html>
